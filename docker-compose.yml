services:
  postgres:
    image: postgres:16
    container_name: wb_marketplace_postgres
    environment:
      POSTGRES_DB: wb_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Монтирует папку со скриптами
      - ./init-scripts:/docker-entrypoint-initdb.d

volumes:
  postgres_data: